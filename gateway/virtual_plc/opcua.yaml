# Gateway config for the virtual OPC UA PLC (virtual_plc/opcua_server.py).
# Run the server first, then:
#   python -m plc_gateway --config virtual_plc/opcua.yaml --i-have-authorization --run-for 15

poll_interval_ms: 200
min_stop_ms: 1000

sink:
  type: console

machines:
  - name: "Line 1 - Station A"
    protocol: opcua
    opcua:
      endpoint: "opc.tcp://127.0.0.1:4840/stoptrack/"
    tags:
      running:    { address: "ns=2;s=Machine_Running", type: bool }
      faultCode:  { address: "ns=2;s=Fault_Code",      type: int  }
      cycleCount: { address: "ns=2;s=Cycle_Count",     type: int  }
    rules:
      - { when: "running edge false", emit: stop_started }
      - { when: "running edge true",  emit: stop_ended, enrich: { reason_from: faultCode } }
    faultMap:
      4: "Tooling change"
      7: "Material jam"
      2: "Laser cleaning"
