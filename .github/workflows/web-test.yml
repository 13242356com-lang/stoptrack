name: Web app test

# Headless-browser end-to-end test of the StopTrack web app (index.html). Renders
# the real app in Chromium (Playwright), simulates the Android native bridge, and
# drives the operator stop-report flow — the path that regressed once. Runs on
# every change to the web app so a broken stop-report is caught before release.
on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "StopTrack.tsx"
      - "index.html"
      - "build/**"
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/web-test.yml"
  pull_request:
    paths:
      - "StopTrack.tsx"
      - "index.html"
      - "build/**"
      - "test/**"
      - "package.json"
  workflow_dispatch:

jobs:
  web:
    name: Build + browser e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # `npm test` = rebuild index.html from StopTrack.tsx, then run the browser
      # e2e against the fresh build (so the test validates the source, not a stale
      # committed artifact).
      - name: Build + run web e2e
        run: npm test
