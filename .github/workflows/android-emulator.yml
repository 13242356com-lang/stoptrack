name: Android emulator smoke test

# Boots a real Android emulator in CI, installs the phone app, and runs an
# instrumented smoke test (android/mobile/src/androidTest/.../SmokeTest.kt) plus a
# screenshot — the on-device check the cloud coding session can't do by hand.
# This catches boot-time crashes (foreground-service, WebView init, bridge) that
# a compile-only build would miss. Functional stop-flow logic is covered by the
# faster headless web test (web-test.yml).
on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "android/**"
      - "index.html"
      - ".github/workflows/android-emulator.yml"
  pull_request:
    paths:
      - "android/**"
      - "index.html"
  workflow_dispatch:

jobs:
  emulator:
    name: Emulator smoke test + screenshot
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Android emulators need hardware acceleration (KVM) to boot in reasonable time.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Node inlines React + Tailwind into the bundled web asset (prepareWebAsset).
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run smoke test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          working-directory: android
          script: |
            adb logcat -c || true
            # Install + launch the app, then grab a screenshot of the live UI.
            ./gradlew :mobile:installDebug --no-daemon --stacktrace
            adb shell am start -n com.stoptrack/com.stoptrack.mobile.MainActivity || true
            sleep 12
            adb exec-out screencap -p > ../app-screenshot.png || true
            # The actual assertion: the boot/smoke instrumented test.
            ./gradlew :mobile:connectedDebugAndroidTest --no-daemon --stacktrace
            adb logcat -d > ../emulator-logcat.txt || true

      - name: Upload app screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshot
          path: app-screenshot.png
          if-no-files-found: warn

      - name: Upload instrumented test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-report
          path: android/mobile/build/reports/androidTests/
          if-no-files-found: warn

      - name: Upload logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-logcat
          path: emulator-logcat.txt
          if-no-files-found: warn
