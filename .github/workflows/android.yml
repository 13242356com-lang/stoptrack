name: Build watch app

# Bakes the two installable app files (APKs):
#   - phone companion  (android/mobile)
#   - watch app        (android/wear)
# On main, the APKs are published to the repo's Releases page (friendly names);
# every run also attaches them under its "Artifacts" section (raw names).
#
# Runs automatically when anything under android/ changes, and can be started by
# hand from the Actions tab with the "Run workflow" button (workflow_dispatch).
on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
  workflow_dispatch:

jobs:
  build:
    name: Build phone + watch APKs
    runs-on: ubuntu-latest
    # Needed so the release step can publish the APKs to the Releases page.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Node lets :mobile's prepareWebAsset task inline React + Tailwind into the
      # bundled web app so the phone app works offline on the factory floor.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build debug APKs
        working-directory: android
        run: ./gradlew :mobile:assembleDebug :wear:assembleDebug --stacktrace --no-daemon

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: stoptrack-apks
          if-no-files-found: error
          path: |
            android/mobile/build/outputs/apk/debug/*.apk
            android/wear/build/outputs/apk/debug/*.apk

      # On main, also publish the APKs to the repo's Releases page with friendly
      # names, so they're a one-tap download from the repo front page — no digging
      # through Actions, no zip. Refreshes the "latest" release each build.
      - name: Rename APKs for release
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p release
          cp android/mobile/build/outputs/apk/debug/mobile-debug.apk release/StopTrack-phone.apk
          cp android/wear/build/outputs/apk/debug/wear-debug.apk release/StopTrack-watch.apk

      - name: Publish to Releases
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest StopTrack build (phone + watch APKs)
          prerelease: true
          body: |
            Auto-built from the latest `main`.

            - **StopTrack-phone.apk** — install on the phone (the companion/bridge)
            - **StopTrack-watch.apk** — install on the Samsung / Wear OS watch

            Step-by-step install guide: [`android/INSTALL.md`](https://github.com/13242356com-lang/stoptrack/blob/main/android/INSTALL.md)
          files: release/*.apk
